<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorador de Tipologías de Reclamos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f3;color:#1a1a18;padding:1.5rem}
h1{font-size:20px;font-weight:500;margin-bottom:4px;color:#1a1a18}
.subtitle{font-size:14px;color:#888780;margin-bottom:1.5rem}
.search-wrap{position:relative;margin-bottom:1rem}
#search{width:100%;padding:10px 14px 10px 38px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;color:#1a1a18;font-size:14px;outline:none}
#search:focus{border-color:#888780}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#888780;font-size:16px;pointer-events:none}
.stats{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.stat{background:#e8e7e0;border-radius:8px;padding:6px 14px;font-size:12px;color:#5f5e5a}
.stat b{color:#1a1a18;font-weight:500}
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:1rem;flex-wrap:wrap;font-size:13px;color:#888780}
.breadcrumb span.link{cursor:pointer;color:#185fa5;padding:2px 6px;border-radius:4px}
.breadcrumb span.link:hover{background:#e6f1fb}
.breadcrumb .sep{color:#b4b2a9}
.breadcrumb .current{color:#1a1a18;font-weight:500}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.card{background:#fff;border:1px solid #d3d1c7;border-radius:12px;padding:14px 16px;cursor:pointer;transition:border-color 0.15s,background 0.15s;position:relative}
.card:hover{border-color:#888780;background:#f5f5f3}
.card-label{font-size:11px;font-weight:500;color:#b4b2a9;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em}
.card-name{font-size:14px;font-weight:500;color:#1a1a18;line-height:1.4;margin-bottom:8px;padding-right:20px}
.card-count{font-size:12px;color:#888780}
.card-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#b4b2a9;font-size:18px}
.card-desc{font-size:12px;color:#888780;line-height:1.5;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.submotivo-card{background:#fff;border:1px solid #d3d1c7;border-radius:12px;padding:14px 16px}
.submotivo-name{font-size:14px;font-weight:500;color:#1a1a18;margin-bottom:6px}
.submotivo-desc{font-size:13px;color:#5f5e5a;line-height:1.6}
.motivo-header{background:#f1efe8;border:1px solid #d3d1c7;border-radius:12px;padding:14px 16px;margin-bottom:1rem}
.motivo-header .label{font-size:11px;font-weight:500;color:#b4b2a9;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px}
.motivo-header .title{font-size:16px;font-weight:500;color:#1a1a18;margin-bottom:6px}
.motivo-header .desc{font-size:13px;color:#5f5e5a;line-height:1.6}
.search-result-card{background:#fff;border:1px solid #d3d1c7;border-radius:12px;padding:12px 16px;cursor:pointer;margin-bottom:8px}
.search-result-card:hover{border-color:#888780;background:#f5f5f3}
.search-path{font-size:11px;color:#b4b2a9;margin-bottom:4px}
.search-name{font-size:14px;font-weight:500;color:#1a1a18;margin-bottom:4px}
.search-desc{font-size:12px;color:#888780;line-height:1.5}
.empty{text-align:center;padding:2rem;color:#888780;font-size:14px}
mark{background:rgba(255,200,0,0.35);color:inherit;border-radius:2px;padding:0 1px}
</style>
</head>
<body>
<h1>Árbol de Tipologías de Reclamos</h1>
<p class="subtitle">Explora las áreas, motivos y submotivos de reclamos</p>

<div class="search-wrap">
  <span class="search-icon">&#9906;</span>
  <input type="text" id="search" placeholder="Buscar área, motivo o submotivo..." />
</div>
<div class="stats" id="stats"></div>
<div class="breadcrumb" id="breadcrumb"></div>
<div id="content"></div>

<script>
const DATA = {"TRÁMITES":{"TRASLADO  DE CARRERA":{"descripcion":"Reclamos relacionados a la gestión, evaluación y registro del trámite de traslado de carrera solicitado por el estudiante.","submotivos":[{"nombre":"convalidación pendiente/ errada","descripcion":"Cuando el estudiante presenta convalidaciones pendientes o detecta errores en la convalidación aplicada tras el traslado."},{"nombre":"Retraso en trámite","descripcion":"Cuando el estudiante experimenta demoras en la evaluación o resolución de su solicitud de traslado."},{"nombre":"Error en generación de boletas/cargo","descripcion":"Cuando el estudiante identifica inconsistencias en la emisión de la boleta o cargo correspondiente al trámite."},{"nombre":"Error en registro de solicitud","descripcion":"Cuando el estudiante detecta errores en el registro o ingreso de su solicitud de traslado."},{"nombre":"Error en la carrera elegida","descripcion":"Cuando el estudiante identifica que el traslado fue aplicado a una carrera distinta a la solicitada."},{"nombre":"Otros errores en el trámite","descripcion":"Cuando el estudiante presenta inconvenientes adicionales que afectan la correcta ejecución del traslado de carrera."}]},"TRASLADO DE MODALIDAD":{"descripcion":"Reclamos relacionados a la gestión, evaluación y registro del trámite de traslado de modalidad solicitado por el estudiante.","submotivos":[{"nombre":"convalidación pendiente/ errada","descripcion":"Cuando el estudiante presenta convalidaciones pendientes o detecta errores en la convalidación aplicada tras el traslado de modalidad."},{"nombre":"Retraso en trámite","descripcion":"Cuando el estudiante experimenta demoras en la evaluación o resolución de su solicitud de traslado de modalidad."},{"nombre":"Error en generación de boletas/cargo","descripcion":"Cuando el estudiante identifica inconsistencias en la emisión de la boleta o cargo correspondiente al trámite."},{"nombre":"Error en registro de solicitud","descripcion":"Cuando el estudiante detecta errores en el registro o ingreso de su solicitud de traslado de modalidad."},{"nombre":"Error en la modalidad elegida","descripcion":"Cuando el estudiante identifica que el traslado fue aplicado a una modalidad distinta a la solicitada."},{"nombre":"Otros errores en el trámite","descripcion":"Cuando el estudiante presenta inconvenientes adicionales que afectan la correcta ejecución del traslado de modalidad."}]},"CARNÉ UNIVERSITARIO":{"descripcion":"Reclamos relacionados al registro de solicitud y/o emisión del carné de medio pasaje o universitario","submotivos":[{"nombre":"Retraso en entrega","descripcion":"cuando reportan el incumpliento de la entrega del carné dentro del plazo indicado, cuando se generan retrasos en la entrega del carné universitario"},{"nombre":"Trámite rechazado","descripcion":"cuando la solicitud para la emisión del carné universitario fue rechazada sin sustento o solicitan que se brinde el motivo del rechazo."},{"nombre":"Error en los datos del carné emitido (nombre, DNI, código, etc.)","descripcion":"cuando reportan que el carné fue emitido con datos errados"},{"nombre":"Duplicado de carne","descripcion":"cuando reportan inconvenientes para gestionar el duplicado del carné"},{"nombre":"Error en generación de boletas/cargo","descripcion":"cuando reportan inconvenientes para la emisión del cargo correspondiente al derecho de emisión del carné, cuando el sistema no genera la boleta correspondiente al trámite de emisión del carné"},{"nombre":"Error en el registro de la solicitud","descripcion":"cuando reportan que no puede ingresar solicitud"},{"nombre":"No figura trámite habilitado","descripcion":"Cuando el alumno reclama que no puede registrar y/o no está habilitado el trámite"},{"nombre":"Error en entrega en sede/ domicilio","descripcion":"cuando reportan inconvenientes con la entrega del carné en sede (no se encuentra carné en el campus elegido) o domicilio (no encuentran a la persona encarga, no se apersona el motorizado en la fecha indicada)"}]},"TRASLADO DE SEDES / CAMPUS":{"descripcion":"Reclamos relacionados a la gestión, evaluación y registro del trámite de traslado de sede o campus solicitado por el estudiante.","submotivos":[{"nombre":"Retraso en trámite","descripcion":"Cuando el estudiante experimenta demoras en la evaluación o resolución de su solicitud de traslado de sede o campus."},{"nombre":"Error en generación de boletas/cargo","descripcion":"Cuando el estudiante identifica inconsistencias en la emisión de la boleta o cargo correspondiente al trámite."},{"nombre":"Error en registro de solicitud","descripcion":"Cuando el estudiante detecta errores en el registro o ingreso de su solicitud de traslado."},{"nombre":"Error en sede elegida","descripcion":"Cuando el estudiante identifica que el traslado fue aplicado a una sede o campus distinto al solicitado."},{"nombre":"Otros errores en el trámite","descripcion":"Cuando el estudiante presenta inconvenientes adicionales que afectan la correcta ejecución del traslado de sede o campus."}]},"RETIRO DE CICLO":{"descripcion":"Reclamos relacionados a la gestión, habilitación y validación del trámite de retiro de ciclo del estudiante.","submotivos":[{"nombre":"No figura trámite habilitado","descripcion":"Cuando el estudiante no visualiza la opción para iniciar o gestionar el retiro de ciclo en la plataforma."},{"nombre":"Retraso en trámite","descripcion":"Cuando el estudiante presenta demoras en la evaluación o confirmación de su solicitud de retiro de ciclo."},{"nombre":"Error en generación de boletas/cargo","descripcion":"Cuando el estudiante identifica inconsistencias en la emisión de la boleta o cargo correspondiente al trámite."},{"nombre":"Error en validación de pago","descripcion":"Cuando el estudiante realiza el pago del trámite y este no es reconocido o validado correctamente en el sistema."}]},"RESERVA DE MATRÍCULA":{"descripcion":"Reclamos relacionados a la gestión, validación de pago y habilitación del trámite de reserva de matrícula del estudiante.","submotivos":[{"nombre":"Retraso en trámite","descripcion":"Cuando el estudiante presenta demoras en la evaluación o confirmación de su solicitud de reserva de matrícula."},{"nombre":"Error en validación de pago","descripcion":"Cuando el estudiante realiza el pago del trámite y este no es reconocido o validado correctamente en el sistema."},{"nombre":"Error en generación de boletas/cargo","descripcion":"Cuando el estudiante identifica inconsistencias en la emisión de la boleta o cargo correspondiente al trámite."},{"nombre":"No figura trámite habilitado","descripcion":"Cuando el estudiante no visualiza la opción para iniciar o gestionar la reserva de matrícula en la plataforma."}]},"RETIRO DE CURSO":{"descripcion":"Reclamos relacionados a la gestión, aplicación y validación del trámite de retiro de curso solicitado por el estudiante.","submotivos":[{"nombre":"Retraso en trámite","descripcion":"Cuando el estudiante presenta demoras en la evaluación o confirmación de su solicitud de retiro de curso."},{"nombre":"Error en aplicación del retiro","descripcion":"Cuando el estudiante identifica que el retiro solicitado no fue aplicado correctamente en su registro académico."},{"nombre":"No figura trámite habilitado","descripcion":"Cuando el estudiante no visualiza la opción para iniciar o gestionar el retiro de curso en la plataforma."},{"nombre":"Error en validación de pago","descripcion":"Cuando el estudiante realiza el pago del trámite y este no es reconocido o validado correctamente en el sistema."},{"nombre":"Error en generación de boletas/cargo","descripcion":"Cuando el estudiante identifica inconsistencias en la emisión de la boleta o cargo correspondiente al trámite."}]},"CERTIFICADO / CONSTANCIAS Y SILABOS":{"descripcion":"Reclamos relacionados a la gestión, emisión, validación de pago y entrega de certificados, constancias y sílabos solicitados por el estudiante.","submotivos":[{"nombre":"Retraso en trámite","descripcion":"Cuando el estudiante presenta demoras en la gestión o emisión del documento solicitado."},{"nombre":"Error en generación de boletas/cargo","descripcion":"Cuando el estudiante identifica inconsistencias en la generación de la boleta o cargo del trámite."},{"nombre":"Documento no entregado","descripcion":"Cuando el estudiante no recibe el documento solicitado dentro del plazo establecido o por los canales indicados."},{"nombre":"Error en validación de pago","descripcion":"Cuando el estudiante realiza el pago del trámite y este no es reconocido o validado correctamente en el sistema."},{"nombre":"Error en la emisión del documento","descripcion":"Cuando el estudiante detecta errores en la información o contenido del documento emitido."},{"nombre":"Documentos Extraviados","descripcion":"Cuando el estudiante reporta la pérdida del documento solicitado durante el proceso de entrega o gestión."}]},"CERTIFICACIÓN DE DOCUMENTOS":{"descripcion":"Reclamos relacionados al trámite de certificación de documentos. Reclamos relacionados a la gestión, emisión y entrega de certificaciones de documentos solicitadas por el estudiante.","submotivos":[{"nombre":"Retraso en trámite","descripcion":"Cuando el estudiante presenta demoras en la gestión o finalización de la certificación de documentos."},{"nombre":"Boleta no emitida","descripcion":"Cuando el estudiante realiza la solicitud o pago del trámite y no se genera la boleta correspondiente."},{"nombre":"Documento no enviado","descripcion":"Cuando el estudiante no recibe la certificación solicitada dentro del plazo establecido o por los canales indicados."}]},"CONVALIDACIÓN DE CURSO":{"descripcion":"Reclamos relacionados a la gestión, evaluación y registro de solicitudes de convalidación de cursos.","submotivos":[{"nombre":"Retraso en trámite","descripcion":"Cuando el estudiante presenta demoras en la evaluación o resolución de su solicitud de convalidación."},{"nombre":"Convalidación incompleta / incorrecta","descripcion":"Cuando el estudiante identifica que la convalidación aplicada no corresponde totalmente a los cursos solicitados o presenta errores en su registro."},{"nombre":"Error al ingresar trámite","descripcion":"Cuando el estudiante enfrenta inconvenientes al registrar o enviar la solicitud de convalidación en la plataforma."}]},"ACTUALIZACIÓN DE DATOS":{"descripcion":"Reclamos donde reportar tener inconvenientes para actualizar sus datos desde la plataforma o para el registro de su solicitud de actualización de datos sensibles","submotivos":[{"nombre":"Retraso en trámite","descripcion":"Cuando reportan que no se ha cumplido con el plazo establecido para la atención de solicitudes de actualización de datos"},{"nombre":"Rechazo injustificado","descripcion":"Cuando no se brinda detalles del motivo por el cual la solicitud fue rechazada o los motivos no tienen sustento"},{"nombre":"Inconvenientes con el trámite","descripcion":"Cuando reportan tener inconvenientes para registrar la solicitud del trámite de actualización de datos"}]},"ORDEN DE MÉRITO":{"descripcion":"Reclamos relacionados a la evaluación, registro y publicación del orden de mérito académico del estudiante.","submotivos":[{"nombre":"Error en el registro / Sin registro","descripcion":"Cuando el estudiante identifica errores en su posición dentro del orden de mérito o no figura registrado en el listado correspondiente."}]},"ACTUALIZACIÓN DE FOTOS":{"descripcion":"Reclamos relacionados al trámite de actualización de fotos","submotivos":[{"nombre":"Retraso en trámite","descripcion":"Cuando reportan que no se ha cumplido con el plazo establecido para la atención de solicitudes de actualización de fotos"},{"nombre":"Rechazo injustificado","descripcion":"Cuando reportan no estar de acuerdo con el rechazo de la solicitud o no se les brindó el detalle del motivo y/o motivos del rechazo de la solicitud"}]},"AGREGACIÓN DE CARRERA":{"descripcion":"Reclamos relacionados con la solicitud de agregación de carrera (alumnos egresados que desean llevar una segunda carrera)","submotivos":[{"nombre":"Retraso en trámite","descripcion":"Cuando reportan que hay inconveniente con el plazo de atención del trámite"},{"nombre":"No figura trámite habilitado","descripcion":"Cuando el alumno reclama que no puede registrar y/o no está habilitado el trámite"},{"nombre":"Error en validación de pago","descripcion":"Cuando el alumno reporta que figura pendiente a pesar de haber pagado"},{"nombre":"Error en generación de boletas/cargo","descripcion":"Cuando el alumno reporta que figura un importe distitnto al precio del trámite"}]}},"FACTURACIÓN":{"DEVOLUCIÓN DE PAGOS":{"descripcion":"Reclamos relacionados a la gestión, disponibilidad o ejecución de devoluciones de pagos realizados por el estudiante.","submotivos":[{"nombre":"Traslado de pago","descripcion":"Cuando el estudiante solicita que un pago realizado sea aplicado a otro concepto o periodo."},{"nombre":"Retraso en trámite","descripcion":"Cuando el estudiante experimenta demoras en el procesamiento de la devolución solicitada."},{"nombre":"Error en el registro de la solicitud","descripcion":"Cuando la solicitud de devolución presenta errores en su registro o información consignada."},{"nombre":"No figura trámite habilitado","descripcion":"Cuando el estudiante no encuentra disponible el trámite para solicitar la devolución."},{"nombre":"Gasto de reembolso","descripcion":"Cuando el estudiante cuestiona el cobro o descuento aplicado por concepto de gastos de reembolso."},{"nombre":"Devolución no corresponde","descripcion":"Cuando se informa al estudiante que la devolución solicitada no aplica según las políticas vigentes."},{"nombre":"Devolución por pago doble","descripcion":"Cuando el estudiante solicita la devolución de un monto pagado por duplicado."},{"nombre":"Devolución no disponible","descripcion":"Cuando el estudiante es informado que la devolución no se encuentra habilitada o disponible."},{"nombre":"Datos errados en cheque","descripcion":"Cuando el cheque emitido para la devolución contiene datos incorrectos."}]},"BOLETAS DE PAGO":{"descripcion":"Reclamos relacionandos a inconvenientes con la emisión, contenido, cobros o medios de pago de sus boletas.","submotivos":[{"nombre":"Datos incorrectos","descripcion":"Cuando la boleta contiene errores en los datos del estudiante, concepto o monto facturado."},{"nombre":"Demora en la emisión de boletas","descripcion":"Cuando el estudiante no recibe su boleta dentro de los plazos establecidos."},{"nombre":"Anulación de boletas","descripcion":"Cuando el estudiante solicita la anulación de una boleta emitida de manera incorrecta."},{"nombre":"Pago por repitencia","descripcion":"Cuando se le aplica un cargo por repitencia de cursos y no esta de acuerdo."},{"nombre":"Cargo por créditos","descripcion":"Cuando el estudiante cuestiona el cálculo o aplicación del cobro por número de créditos."},{"nombre":"Lugar y formas de pago","descripcion":"Cuando el estudiante reporta dificultades o confusión respecto a los canales o medios disponibles para realizar el pago."}]},"DEUDA PENDIENTE":{"descripcion":"Reclamos relacionados a discrepancias, validaciones o cobros asociados a deudas pendientes del estudiante.","submotivos":[{"nombre":"Error en importe facturado","descripcion":"Cuando el estudiante detecta diferencias o errores en el monto de la deuda facturada."},{"nombre":"Validación de pagos","descripcion":"Cuando el estudiante solicita la verificación o confirmación de pagos realizados."},{"nombre":"No reconoce deuda","descripcion":"Cuando el estudiante indica que no reconoce la deuda registrada en su estado de cuenta."},{"nombre":"Cobro de moras e intereses","descripcion":"Cuando el estudiante cuestiona la aplicación de moras o intereses sobre su deuda."},{"nombre":"Cobro de gastos administrativos","descripcion":"Cuando el estudiante observa o reclama la aplicación de gastos administrativos asociados a la deuda."}]},"FACILIDADES DE PAGO":{"descripcion":"Reclamos relacionados a la solicitud, aplicación o modificación d let state = {area:null, motivo:null, query:''};

function totalMotivos(){let t=0;Object.values(DATA).forEach(a=>t+=Object.keys(a).length);return t;}
function totalSubmotivos(){let t=0;Object.values(DATA).forEach(a=>Object.values(a).forEach(m=>t+=m.submotivos.length));return t;}

function hl(text,q){
  if(!q) return text;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return text.replace(re,'<mark>$1</mark>');
}

function renderStats(){
  const s=document.getElementById('stats');
  s.innerHTML=`<div class="stat"><b>${Object.keys(DATA).length}</b> Áreas</div><div class="stat"><b>${totalMotivos()}</b> Motivos</div><div class="stat"><b>${totalSubmotivos()}</b> Submotivos</div>`;
}

function renderBreadcrumb(){
  const bc=document.getElementById('breadcrumb');
  let html=`<span class="link" onclick="goHome()">Inicio</span>`;
  if(state.area){
    html+=`<span class="sep">›</span><span class="link" onclick="goArea()">${state.area}</span>`;
    if(state.motivo) html+=`<span class="sep">›</span><span class="current">${state.motivo}</span>`;
  }
  bc.innerHTML=html;
}

function goHome(){state={area:null,motivo:null,query:''};document.getElementById('search').value='';render();}
function goArea(){state.motivo=null;state.query='';document.getElementById('search').value='';render();}

function renderSearchResults(q){
  const results=[];
  Object.entries(DATA).forEach(([area,motivos])=>{
    const aL=area.toLowerCase();
    Object.entries(motivos).forEach(([mot,{descripcion,submotivos}])=>{
      const mL=mot.toLowerCase(),dL=descripcion.toLowerCase();
      submotivos.forEach(({nombre,descripcion:desc})=>{
        const nL=nombre.toLowerCase(),ddL=desc.toLowerCase();
        if(aL.includes(q)||mL.includes(q)||dL.includes(q)||nL.includes(q)||ddL.includes(q)){
          results.push({area,motivo:mot,nombre,descripcion:desc});
        }
      });
    });
  });
  const c=document.getElementById('content');
  if(!results.length){c.innerHTML=`<div class="empty">No se encontraron resultados para "<b>${q}</b>"</div>`;return;}
  c.innerHTML=`<div style="font-size:13px;color:#888780;margin-bottom:12px;">${results.length} resultado${results.length!==1?'s':''} encontrado${results.length!==1?'s':''}</div>`+
    results.map(r=>`<div class="search-result-card" onclick="state.area='${r.area.replace(/'/g,"\\'")}';state.motivo='${r.motivo.replace(/'/g,"\\'")}';state.query='';document.getElementById('search').value='';render()">
      <div class="search-path">${hl(r.area,q)} › ${hl(r.motivo,q)}</div>
      <div class="search-name">${hl(r.nombre,q)}</div>
      <div class="search-desc">${hl(r.descripcion,q)}</div>
    </div>`).join('');
}

function render(){
  renderBreadcrumb();
  const q=state.query.toLowerCase().trim();
  if(q){renderSearchResults(q);return;}
  const c=document.getElementById('content');
  if(!state.area){
    c.innerHTML=`<div class="grid">${Object.entries(DATA).map(([area,motivos])=>{
      const nm=Object.keys(motivos).length;
      const ns=Object.values(motivos).reduce((s,m)=>s+m.submotivos.length,0);
      return `<div class="card" onclick="state.area='${area.replace(/'/g,"\\'")}';render()">
        <div class="card-label">Área</div>
        <div class="card-name">${area}</div>
        <div class="card-count">${nm} motivo${nm!==1?'s':''} · ${ns} submotivo${ns!==1?'s':''}</div>
        <span class="card-arrow">›</span>
      </div>`;
    }).join('')}</div>`;
  } else if(!state.motivo){
    const motivos=DATA[state.area];
    c.innerHTML=`<div class="grid">${Object.entries(motivos).map(([mot,{descripcion,submotivos}])=>{
      const ns=submotivos.length;
      return `<div class="card" onclick="state.motivo='${mot.replace(/'/g,"\\'")}';render()">
        <div class="card-label">Motivo</div>
        <div class="card-name">${mot}</div>
        <div class="card-count">${ns} submotivo${ns!==1?'s':''}</div>
        <div class="card-desc">${descripcion}</div>
        <span class="card-arrow">›</span>
      </div>`;
    }).join('')}</div>`;
  } else {
    const {descripcion,submotivos}=DATA[state.area][state.motivo];
    c.innerHTML=`<div class="motivo-header">
      <div class="label">Descripción del motivo</div>
      <div class="title">${state.motivo}</div>
      <div class="desc">${descripcion}</div>
    </div>
    <div class="grid">${submotivos.map(({nombre,descripcion:desc})=>`<div class="submotivo-card">
      <div class="submotivo-name">${nombre}</div>
      <div class="submotivo-desc">${desc}</div>
    </div>`).join('')}</div>`;
  }
}

document.getElementById('search').addEventListener('input',e=>{
  state.query=e.target.value;
  if(state.query){state.area=null;state.motivo=null;}
  render();
});

renderStats();
render();
</script>
</body>
</html>
